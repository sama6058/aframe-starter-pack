<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
    <a-sphere position="0 3.9 -5" radius="1.35" color="#white"></a-sphere>
     <a-sphere position="0 6.5 -5" radius="1.25" color="#white"></a-sphere>
    <a-sphere position="0 1.25 -5" radius="1.55" color="#white"></a-sphere>
      <a-cylinder position="0 7.75 -5" radius=".5" height=2" color="#78f8A4"></a-cylinder>
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#78f8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: moon; dressingAmount: 100"></a-entity>
    </a-scene>
  </body>
</html>
