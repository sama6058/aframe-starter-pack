<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Trippy Beach World</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <a-assets>
        <!-- Background -->
        <img id="bg" src="Assets/backgroundfinal.jpg">

        <!-- 3D Models -->
        <a-asset-item id="treeModel" src="Assets/trees.obj"></a-asset-item>
         <a-asset-item id="ballObj" src="Assets/BeachBall.obj"></a-asset-item>
         <a-asset-item id="ballMtl" src="Assets/BeachBall.mtl"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 6"></a-camera>

      <a-sky src="#bg" material="shader: flat"></a-sky>

      <a-plane
        position="0 0 -6"
        rotation="-90 0 0"
        width="30"
        height="30"
        color="#ff7fd1">
      </a-plane>

      <a-plane
        position="0 0.02 -11"
        rotation="-90 0 0"
        width="18"
        height="10"
        color="#42e9f5"
        opacity="0.85">
      </a-plane>

<a-entity
  obj-model="obj: url(Assets/trees.obj)"
  position="-4 0 -10"
  rotation="0 20 0"
  scale="1 1 1">
</a-entity>

<a-entity
  obj-model="obj: url(Assets/trees.obj)"
  position="-1 0 -11"
  rotation="0 0 0"
  scale="0.7 0.7 0.7">
</a-entity>

<a-entity
  obj-model="obj: url(Assets/trees.obj)"
  position="5 0 -9"
  rotation="0 -20 0"
  scale="0.8 0.8 0.8">
</a-entity>

    <a-entity
      obj-model="obj: #ballObj; mtl: #ballMtl"
      position="1 1 -4"
      rotation="0 0 0"
      scale="0.03 0.03 0.03">
    </a-entity> 
      
      <a-sphere
        position="-3 0.8 -10"
        radius="0.8"
        color="#00ff22"
        opacity="0.7">
      </a-sphere>

      <a-torus
        position="3 3 -10"
        radius="1"
        radius-tubular="0.08"
        rotation="45 0 0"
        color="#ffff00"
        animation="property: rotation; to: 45 360 0; loop: true; dur: 9000; easing: linear">
      </a-torus>

      <a-cylinder
        position="0 1 -15"
        radius="0.35"
        height="2.5"
        color="#b266ff">
      </a-cylinder>

    </a-scene>
  </body>
</html>x
