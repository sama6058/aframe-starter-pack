<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="bg" src="Assets/newbackground.jpg">       
        <img id="tex1" src="Assets/texture1.jpg">
        <img id="tex2" src="Assets/texture2.jpg">
        <img id="tex3" src="Assets/texture3.jpg">
        <img id="tex4" src="Assets/texture4.jpg">
      </a-assets>

      <!-- Camera and Background -->
      <a-camera position="0 1.6 6"></a-camera>
      <a-sky src="#bg" material="shader: flat"></a-sky>
      <!-- Ground -->
      <a-plane
        position="0 0 -3"
        rotation="-90 0 0"
        width="12"
        height="12"
        src="#tex1">
        </a-plane>
      <!-- Ice Cream Cone -->
      <a-cone
        position="0 0.55 -3"
        rotation="180 0 0"
        radius-bottom="0.5"
        height="1.5"
        src="#tex2">
      </a-cone>

      <a-sphere
        position="0 1.65 -3"
        radius="0.7"
        src="#tex3">
      </a-sphere>

      <!-- Umbrella pole -->
      <a-cylinder
        position="2 0.75 -3"
        radius="0.1"
        height="1.5"
        src="#tex4">
      </a-cylinder>

      <!-- Umbrella top -->
      <a-cone
        position="2 1.75 -3"
        radius-bottom="1"
        height="1"
        src="#tex3">
      </a-cone>

    </a-scene>
  </body>
</html>
